<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — NeuroScan</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo">N</div>
        <div>
          <h1>NeuroScan</h1>
          <p class="tagline">AI-assisted EEG seizure detection</p>
        </div>
      </div>

      <h2 class="auth-title">Sign in to continue</h2>
      <p class="muted small">Use the demo credentials below to access the dashboard.</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form" autocomplete="off">
        <label>
          <span>Username</span>
          <input type="text" name="username" required autofocus />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required />
        </label>
        <button type="submit" class="btn primary auth-btn">Sign in</button>
      </form>

      <div class="auth-hint">
        <p class="muted small"><strong>Demo accounts</strong></p>
        <p class="muted small">admin / admin · demo / demo123</p>
      </div>
    </div>
  </div>
</body>
</html>
